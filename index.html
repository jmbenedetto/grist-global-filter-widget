<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Filter Widget</title>
  <link rel="stylesheet" href="styles.css?v=20260613-responsive-fields">
  <script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
</head>
<body>
  <main class="app-shell compact-shell">
    <section id="filter-bar" class="filter-bar vertical" aria-label="Filter bar">
      <div id="active-chips" class="chip-list compact vertical" aria-live="polite"></div>
      <button id="add-filter-placeholder" class="add-filter-placeholder" type="button">Click to add filter</button>
    </section>

    <div id="field-menu" class="popover field-menu" hidden></div>
    <div id="filter-editor" class="popover filter-editor" hidden></div>
  </main>

  <script type="module" src="app.js?v=20260613-responsive-fields"></script>
</body>
</html>
